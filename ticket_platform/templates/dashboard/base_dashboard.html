<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>
      {% block title %}
        Painel Administrativo
      {% endblock %}
    </title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f3f4f6;
        color: #111827;
      }
      
      .layout {
        display: grid;
        grid-template-columns: 260px 1fr;
        min-height: 100vh;
      }
      
      aside {
        background: #111827;
        color: white;
        padding: 24px;
      }
      
      aside h1 {
        font-size: 22px;
        margin-top: 0;
        margin-bottom: 32px;
      }
      
      aside a {
        display: block;
        color: #d1d5db;
        text-decoration: none;
        margin-bottom: 14px;
        padding: 10px 12px;
        border-radius: 8px;
      }
      
      aside a:hover {
        background: #1f2937;
        color: white;
      }
      
      main {
        padding: 32px;
      }
      
      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
      }
      
      .page-header h2 {
        margin: 0;
        font-size: 28px;
      }
      
      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }
      
      .card {
        background: white;
        padding: 24px;
        border-radius: 14px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      }
      
      .card span {
        color: #6b7280;
        font-size: 14px;
      }
      
      .card strong {
        display: block;
        font-size: 32px;
        margin-top: 8px;
      }
      
      .table-card {
        background: white;
        padding: 24px;
        border-radius: 14px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        overflow-x: auto;
      }
      
      table {
        width: 100%;
        border-collapse: collapse;
      }
      
      th {
        text-align: left;
        font-size: 14px;
        color: #6b7280;
        border-bottom: 1px solid #e5e7eb;
        padding: 12px;
      }
      
      td {
        border-bottom: 1px solid #e5e7eb;
        padding: 12px;
        vertical-align: top;
      }
      
      .badge {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: bold;
      }
      
      .badge-pending {
        background: #fef3c7;
        color: #92400e;
      }
      
      .badge-paid {
        background: #dcfce7;
        color: #166534;
      }
      
      .badge-canceled {
        background: #fee2e2;
        color: #991b1b;
      }
      
      .button {
        background: #2563eb;
        color: white;
        border: none;
        padding: 9px 14px;
        border-radius: 8px;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
      }
      
      .button:hover {
        background: #1d4ed8;
      }
      
      .button-success {
        background: #16a34a;
      }
      
      .button-success:hover {
        background: #15803d;
      }
      
      .alert {
        padding: 12px 16px;
        border-radius: 8px;
        margin-bottom: 16px;
        background: #e5e7eb;
      }
      
      .alert.success {
        background: #dcfce7;
        color: #166534;
      }
      
      .alert.error {
        background: #fee2e2;
        color: #991b1b;
      }
      
      .alert.info {
        background: #dbeafe;
        color: #1e40af;
      }
      
      .sidebar-button {
        width: 100%;
        background: #dc2626;
        color: white;
        border: none;
        padding: 10px 12px;
        border-radius: 8px;
        cursor: pointer;
        text-align: left;
        font-size: 15px;
        margin-top: 16px;
      }
      
      .sidebar-button:hover {
        background: #b91c1c;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside>
        <h1>Painel Admin</h1>

        <a href="{% url 'dashboard:home' %}">Dashboard</a>
        <a href="{% url 'dashboard:order_list' %}">Pedidos</a>
        <a href="{% url 'events:event_list' %}">Ver site</a>
        <a href="/admin/">Django Admin</a>

        <form method="post" action="{% url 'dashboard:logout' %}">
          {% csrf_token %}
          <button type="submit" class="sidebar-button">Sair</button>
        </form>
      </aside>

      <main>
        {% if messages %}
          {% for message in messages %}
            <div class="alert {{ message.tags }}">{{ message }}</div>
          {% endfor %}
        {% endif %}

        {% block content %}

        {% endblock %}
      </main>
    </div>
  </body>
</html>
